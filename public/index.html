<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OhMyGold - International Gold Price Today | XAU/USD Spot Price</title>
  <meta name="description" content="Real-time international gold price with 20-year historical chart. Support multiple currencies, units and languages.">

  <link rel="canonical" href="https://ohmygold.pages.dev/">

  <link rel="alternate" hreflang="en" href="https://ohmygold.pages.dev/?lang=en">
  <link rel="alternate" hreflang="zh" href="https://ohmygold.pages.dev/?lang=zh">
  <link rel="alternate" hreflang="ja" href="https://ohmygold.pages.dev/?lang=ja">
  <link rel="alternate" hreflang="ko" href="https://ohmygold.pages.dev/?lang=ko">
  <link rel="alternate" hreflang="es" href="https://ohmygold.pages.dev/?lang=es">
  <link rel="alternate" hreflang="fr" href="https://ohmygold.pages.dev/?lang=fr">
  <link rel="alternate" hreflang="de" href="https://ohmygold.pages.dev/?lang=de">
  <link rel="alternate" hreflang="pt" href="https://ohmygold.pages.dev/?lang=pt">
  <link rel="alternate" hreflang="ru" href="https://ohmygold.pages.dev/?lang=ru">
  <link rel="alternate" hreflang="ar" href="https://ohmygold.pages.dev/?lang=ar">
  <link rel="alternate" hreflang="hi" href="https://ohmygold.pages.dev/?lang=hi">
  <link rel="alternate" hreflang="x-default" href="https://ohmygold.pages.dev/">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ohmygold.pages.dev/">
  <meta property="og:title" content="OhMyGold - International Gold Price Today">
  <meta property="og:description" content="Real-time international gold price with 20-year historical chart. Support multiple currencies, units and languages.">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="OhMyGold - International Gold Price Today">
  <meta name="twitter:description" content="Real-time international gold price with 20-year historical chart. Support multiple currencies, units and languages.">

  <script type="application/ld+json" id="ld-website">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "OhMyGold",
    "url": "https://ohmygold.pages.dev/",
    "description": "Real-time international gold price with 20-year historical chart",
    "inLanguage": ["en", "zh", "ja", "ko", "es", "fr", "de", "pt", "ru", "ar", "hi"],
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://ohmygold.pages.dev/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="application/ld+json" id="ld-price">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Gold Spot Price",
    "category": "Precious Metals",
    "url": "https://ohmygold.pages.dev/",
    "offers": {
      "@type": "Offer",
      "priceCurrency": "USD",
      "price": "",
      "availability": "https://schema.org/InStock",
      "priceValidUntil": ""
    }
  }
  </script>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">OhMyGold</div>
      <div class="header-controls">
        <select id="langSelect" class="select" aria-label="Language">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
          <option value="hi">हिन्दी</option>
        </select>
        <button id="themeToggle" class="btn-icon" aria-label="Toggle theme">
          <span class="icon-sun">&#9728;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="price-card">
      <div class="price-label" data-i18n="currentPrice">Current Price</div>
      <div class="price-value" id="priceValue">
        <span class="price-symbol" id="priceSymbol"></span>
        <span id="priceAmount">--</span>
        <span class="price-unit" id="priceUnit"></span>
      </div>
      <div class="price-meta">
        <span id="priceDate">--</span>
      </div>
    </section>

    <section class="controls">
      <div class="control-group">
        <select id="currencySelect" class="select" aria-label="Currency">
          <option value="USD">USD ($)</option>
          <option value="CNY">CNY (¥)</option>
          <option value="EUR">EUR (€)</option>
          <option value="GBP">GBP (£)</option>
          <option value="JPY">JPY (¥)</option>
        </select>
        <select id="unitSelect" class="select" aria-label="Unit">
          <option value="ozt" data-i18n="unitOzt">Troy Ounce</option>
          <option value="g" data-i18n="unitG">Gram</option>
          <option value="kg" data-i18n="unitKg">Kilogram</option>
        </select>
      </div>
    </section>

    <section class="chart-section">
      <div class="time-range">
        <button class="time-btn" data-range="1m" data-i18n="range1m">1M</button>
        <button class="time-btn" data-range="3m" data-i18n="range3m">3M</button>
        <button class="time-btn" data-range="6m" data-i18n="range6m">6M</button>
        <button class="time-btn" data-range="1y" data-i18n="range1y">1Y</button>
        <button class="time-btn" data-range="3y" data-i18n="range3y">3Y</button>
        <button class="time-btn" data-range="5y" data-i18n="range5y">5Y</button>
        <button class="time-btn" data-range="10y" data-i18n="range10y">10Y</button>
        <button class="time-btn active" data-range="all" data-i18n="rangeAll">All</button>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
      <div class="navigator-container">
        <div class="navigator-mask navigator-mask-left"></div>
        <div class="navigator-window">
          <div class="navigator-handle navigator-handle-left"></div>
          <div class="navigator-handle navigator-handle-right"></div>
        </div>
        <div class="navigator-mask navigator-mask-right"></div>
        <canvas id="navigatorChart"></canvas>
      </div>
    </section>

    <section class="table-section">
      <h2 class="table-title" data-i18n="historicalData">Historical Data</h2>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th data-i18n="date">Date</th>
              <th data-i18n="price">Price</th>
              <th data-i18n="change">Change</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prevPage" class="btn" data-i18n="prev">Previous</button>
        <span id="pageInfo">--</span>
        <span class="page-jump">
          <label for="pageInput" class="sr-only" data-i18n="goToPage">Go to page</label>
          <input type="number" id="pageInput" min="1" value="1">
        </span>
        <button id="nextPage" class="btn" data-i18n="next">Next</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p data-i18n="footerText">Data sourced from Yahoo Finance COMEX Gold Futures. Prices are for reference only.</p>
  </footer>

  <script type="module" src="js/security.js"></script>
  <script type="module" src="js/i18n.js"></script>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/chart.js"></script>
  <script type="module" src="js/navigator.js"></script>
  <script type="module" src="js/table.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
