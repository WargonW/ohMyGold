<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OhMyGold - International Gold Price</title>
  <meta name="description" content="Real-time international gold price with 20-year historical chart. Support multiple currencies, units and languages.">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">OhMyGold</div>
      <div class="header-controls">
        <select id="langSelect" class="select" aria-label="Language">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="pt">Português</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
          <option value="hi">हिन्दी</option>
        </select>
        <button id="themeToggle" class="btn-icon" aria-label="Toggle theme">
          <span class="icon-sun">&#9728;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="price-card">
      <div class="price-label" data-i18n="currentPrice">Current Price</div>
      <div class="price-value" id="priceValue">--</div>
      <div class="price-meta">
        <span id="priceUnit">USD / oz t</span>
        <span class="price-separator">|</span>
        <span id="priceDate">--</span>
      </div>
    </section>

    <section class="controls">
      <div class="control-group">
        <select id="currencySelect" class="select" aria-label="Currency">
          <option value="USD">USD ($)</option>
          <option value="CNY">CNY (¥)</option>
          <option value="EUR">EUR (€)</option>
          <option value="GBP">GBP (£)</option>
          <option value="JPY">JPY (¥)</option>
        </select>
        <select id="unitSelect" class="select" aria-label="Unit">
          <option value="ozt" data-i18n="unitOzt">Troy Ounce</option>
          <option value="g" data-i18n="unitG">Gram</option>
          <option value="kg" data-i18n="unitKg">Kilogram</option>
        </select>
      </div>
    </section>

    <section class="chart-section">
      <div class="time-range">
        <button class="time-btn" data-range="1m" data-i18n="range1m">1M</button>
        <button class="time-btn" data-range="3m" data-i18n="range3m">3M</button>
        <button class="time-btn" data-range="6m" data-i18n="range6m">6M</button>
        <button class="time-btn" data-range="1y" data-i18n="range1y">1Y</button>
        <button class="time-btn" data-range="5y" data-i18n="range5y">5Y</button>
        <button class="time-btn active" data-range="all" data-i18n="rangeAll">All</button>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </section>

    <section class="table-section">
      <h2 class="table-title" data-i18n="historicalData">Historical Data</h2>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th data-i18n="date">Date</th>
              <th data-i18n="price">Price</th>
              <th data-i18n="change">Change</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prevPage" class="btn" data-i18n="prev">Previous</button>
        <span id="pageInfo">--</span>
        <button id="nextPage" class="btn" data-i18n="next">Next</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p data-i18n="footerText">Data sourced from Yahoo Finance COMEX Gold Futures. Prices are for reference only.</p>
  </footer>

  <script type="module" src="js/security.js"></script>
  <script type="module" src="js/i18n.js"></script>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/chart.js"></script>
  <script type="module" src="js/table.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
